version: 2

updates:
  # Root + workspace npm dependencies
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types: [minor, patch]
        patterns: ["*"]
        exclude-patterns: ["eslint*", "@typescript-eslint/*"]
      linting:
        patterns: ["eslint*", "@typescript-eslint/*"]
    labels: [dependencies, automated]
    commit-message:
      prefix: "chore(deps):"

  # Rust/Cargo dependencies
  - package-ecosystem: cargo
    directory: /packages/desktop/src-tauri
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels: [dependencies, rust, automated]
    commit-message:
      prefix: "chore(deps-rust):"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels: [dependencies, ci]
    commit-message:
      prefix: "ci(deps):"
