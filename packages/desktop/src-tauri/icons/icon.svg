<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>
  <!-- Brain outline (simplified) -->
  <g transform="translate(256,240)" fill="none" stroke="white" stroke-width="18" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left hemisphere -->
    <path d="M-10,-80 C-60,-80 -100,-50 -100,0 C-100,20 -90,38 -75,50 C-90,62 -95,80 -85,100 C-75,120 -50,125 -30,115"/>
    <!-- Right hemisphere -->
    <path d="M10,-80 C60,-80 100,-50 100,0 C100,20 90,38 75,50 C90,62 95,80 85,100 C75,120 50,125 30,115"/>
    <!-- Center line -->
    <path d="M0,-80 L0,115"/>
    <!-- Synapse dots -->
    <circle cx="-45" cy="-30" r="6" fill="white" stroke="none"/>
    <circle cx="50" cy="-20" r="6" fill="white" stroke="none"/>
    <circle cx="-35" cy="40" r="6" fill="white" stroke="none"/>
    <circle cx="40" cy="50" r="6" fill="white" stroke="none"/>
  </g>
  <!-- Lightbulb / reminder glow at top -->
  <circle cx="256" cy="110" r="28" fill="url(#accent)" opacity="0.9"/>
  <circle cx="256" cy="110" r="42" fill="url(#accent)" opacity="0.2"/>
  <!-- Exclamation mark in bulb -->
  <rect x="252" y="96" width="8" height="18" rx="4" fill="white"/>
  <circle cx="256" cy="122" r="4" fill="white"/>
  <!-- Bottom text area hint (checkmark) -->
  <g transform="translate(256,420)">
    <path d="M-18,0 L-6,12 L18,-12" fill="none" stroke="white" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  </g>
</svg>
