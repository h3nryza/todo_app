name: CI

on:
  push:
    branches: [main, "feat/*"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    name: Lint and Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Build shared package
        run: npx tsc -p packages/shared/tsconfig.json
      - name: Type-check UI
        run: npx tsc --noEmit -p packages/ui/tsconfig.json

  test-shared:
    name: Test Shared Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Run shared tests
        run: npx vitest run --config packages/shared/vitest.config.ts

  test-ui:
    name: Test UI Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Build shared
        run: npx tsc -p packages/shared/tsconfig.json
      - name: Run UI tests
        run: npm run test -w @ohright/ui --if-present

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Build shared
        run: npx tsc -p packages/shared/tsconfig.json
      - name: Build UI
        run: cd packages/ui && npx vite build
      - uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: packages/ui/dist/
          retention-days: 7

  build-macos:
    name: Build Desktop macOS
    runs-on: macos-latest
    needs: [lint-typecheck, test-shared]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/desktop/src-tauri
      - run: npm ci
      - name: Build shared
        run: npx tsc -p packages/shared/tsconfig.json
      - name: Build UI assets
        run: cd packages/ui && npx vite build
      - name: Build Tauri macOS
        run: cd packages/desktop && npx tauri build
      - uses: actions/upload-artifact@v7
        with:
          name: desktop-macos
          path: packages/desktop/src-tauri/target/release/bundle/dmg/*.dmg
          retention-days: 14

  build-windows:
    name: Build Desktop Windows
    runs-on: windows-latest
    needs: [lint-typecheck, test-shared]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/desktop/src-tauri
      - run: npm ci
      - name: Build shared
        run: npx tsc -p packages/shared/tsconfig.json
      - name: Build UI assets
        run: cd packages/ui && npx vite build
      - name: Build Tauri Windows
        run: cd packages/desktop && npx tauri build
      - uses: actions/upload-artifact@v7
        with:
          name: desktop-windows
          path: packages/desktop/src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 14

  build-linux:
    name: Build Desktop Linux
    runs-on: ubuntu-22.04
    needs: [lint-typecheck, test-shared]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/desktop/src-tauri
      - name: Install Linux deps
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev
      - run: npm ci
      - name: Build shared
        run: npx tsc -p packages/shared/tsconfig.json
      - name: Build UI assets
        run: cd packages/ui && npx vite build
      - name: Build Tauri Linux
        run: cd packages/desktop && npx tauri build
      - uses: actions/upload-artifact@v7
        with:
          name: desktop-linux
          path: |
            packages/desktop/src-tauri/target/release/bundle/deb/*.deb
            packages/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
          retention-days: 14
