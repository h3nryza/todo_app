name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  security-events: write

jobs:
  # ─── Tests ────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Build shared
        run: npx tsc -p packages/shared/tsconfig.json
      - name: Type-check UI
        run: npx tsc --noEmit -p packages/ui/tsconfig.json
      - name: Run unit tests
        run: npx vitest run --config packages/shared/vitest.config.ts

  # ─── Security: Shared (npm + filesystem) ──────────────────────────
  security-shared:
    name: Security Scan (shared)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: npm audit
        run: npm audit --audit-level=high || true
      - name: Trivy SBOM (CycloneDX)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: cyclonedx
          output: sbom-shared.cdx.json
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: json
          output: vuln-shared.json
          severity: CRITICAL,HIGH,MEDIUM,LOW
      - name: Secrets scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified
        continue-on-error: true
      - name: Generate shared dashboard
        run: |
          bash scripts/generate-security-dashboard.sh shared sbom-shared.cdx.json vuln-shared.json security/shared
        env:
          WIWF_VERSION: ${{ github.ref_name }}
      - uses: actions/upload-artifact@v4
        with:
          name: security-shared
          path: security/shared/

  # ─── Build + Security: macOS ──────────────────────────────────────
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/desktop/src-tauri
      - run: npm ci
      - run: npx tsc -p packages/shared/tsconfig.json
      - name: Build Tauri macOS
        run: cd packages/desktop && npx tauri build
      - name: Trivy SBOM (macOS)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: cyclonedx
          output: sbom-macos.cdx.json
      - name: Trivy vuln scan (macOS)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: json
          output: vuln-macos.json
          severity: CRITICAL,HIGH,MEDIUM,LOW
      - name: Cargo audit
        run: |
          cargo install cargo-audit || true
          cd packages/desktop/src-tauri && cargo audit --json > ../../../cargo-audit-macos.json 2>/dev/null || true
        continue-on-error: true
      - name: Generate macOS dashboard
        run: bash scripts/generate-security-dashboard.sh macos sbom-macos.cdx.json vuln-macos.json security/macos
        env:
          WIWF_VERSION: ${{ github.ref_name }}
      - uses: actions/upload-artifact@v4
        with:
          name: security-macos
          path: security/macos/
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-macos
          path: packages/desktop/src-tauri/target/release/bundle/dmg/*.dmg

  # ─── Build + Security: Windows ────────────────────────────────────
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/desktop/src-tauri
      - run: npm ci
      - run: npx tsc -p packages/shared/tsconfig.json
      - name: Build Tauri Windows
        run: cd packages/desktop && npx tauri build
      - name: Trivy SBOM (Windows)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: cyclonedx
          output: sbom-windows.cdx.json
      - name: Trivy vuln scan (Windows)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: json
          output: vuln-windows.json
          severity: CRITICAL,HIGH,MEDIUM,LOW
      - name: Generate Windows dashboard
        shell: bash
        run: bash scripts/generate-security-dashboard.sh windows sbom-windows.cdx.json vuln-windows.json security/windows
        env:
          WIWF_VERSION: ${{ github.ref_name }}
      - uses: actions/upload-artifact@v4
        with:
          name: security-windows
          path: security/windows/
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          path: |
            packages/desktop/src-tauri/target/release/bundle/nsis/*.exe
            packages/desktop/src-tauri/target/release/bundle/msi/*.msi

  # ─── Build + Security: Linux ──────────────────────────────────────
  build-linux:
    name: Build Linux
    runs-on: ubuntu-22.04
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/desktop/src-tauri
      - name: Install Linux deps
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev
      - run: npm ci
      - run: npx tsc -p packages/shared/tsconfig.json
      - name: Build Tauri Linux
        run: cd packages/desktop && npx tauri build
      - name: Trivy SBOM (Linux)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: cyclonedx
          output: sbom-linux.cdx.json
      - name: Trivy vuln scan (Linux)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: json
          output: vuln-linux.json
          severity: CRITICAL,HIGH,MEDIUM,LOW
      - name: Cargo audit
        run: |
          cargo install cargo-audit || true
          cd packages/desktop/src-tauri && cargo audit --json > ../../../cargo-audit-linux.json 2>/dev/null || true
        continue-on-error: true
      - name: Generate Linux dashboard
        run: bash scripts/generate-security-dashboard.sh linux sbom-linux.cdx.json vuln-linux.json security/linux
        env:
          WIWF_VERSION: ${{ github.ref_name }}
      - uses: actions/upload-artifact@v4
        with:
          name: security-linux
          path: security/linux/
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-linux
          path: |
            packages/desktop/src-tauri/target/release/bundle/deb/*.deb
            packages/desktop/src-tauri/target/release/bundle/appimage/*.AppImage

  # ─── Create GitHub Release with all artifacts ─────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [security-shared, build-macos, build-windows, build-linux]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - name: Assemble security reports
        run: |
          mkdir -p release-security
          for platform in shared macos windows linux; do
            if [ -d "artifacts/security-$platform" ]; then
              mkdir -p "release-security/$platform"
              cp -r "artifacts/security-$platform/"* "release-security/$platform/"
            fi
          done
          cd release-security && zip -r ../security-reports.zip . && cd ..
      - name: Collect binaries
        run: |
          mkdir -p release-binaries
          find artifacts/desktop-* -type f \( -name "*.dmg" -o -name "*.exe" -o -name "*.msi" -o -name "*.deb" -o -name "*.AppImage" \) -exec cp {} release-binaries/ \;
          ls -la release-binaries/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: true
          files: |
            release-binaries/*
            security-reports.zip
