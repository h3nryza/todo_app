name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint and Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Build shared package
        run: npx tsc -p packages/shared/tsconfig.json
      - name: Type-check UI
        run: npx tsc --noEmit -p packages/ui/tsconfig.json

  test-shared:
    name: Test Shared Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Run shared tests
        run: npx vitest run --config packages/shared/vitest.config.ts

  test-ui:
    name: Test UI Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Build shared
        run: npx tsc -p packages/shared/tsconfig.json
      - name: Run UI tests
        run: npm run test -w @ohright/ui --if-present

  build-ui:
    name: Build UI
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Build shared
        run: npx tsc -p packages/shared/tsconfig.json
      - name: Build UI
        run: cd packages/ui && npx vite build
      - uses: actions/upload-artifact@v4
        with:
          name: ui-dist
          path: packages/ui/dist/
          retention-days: 7

  build-desktop:
    name: Build Desktop (macOS)
    runs-on: macos-latest
    needs: [lint-and-typecheck, test-shared]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/desktop/src-tauri
      - run: npm ci
      - name: Build shared
        run: npx tsc -p packages/shared/tsconfig.json
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: packages/desktop
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-macos
          path: packages/desktop/src-tauri/target/release/bundle/dmg/*.dmg
          retention-days: 14
